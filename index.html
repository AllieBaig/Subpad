<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Subliminal Player</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Subliminal" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/subliminal_icon_192/192/192" />
    <link rel="apple-touch-icon" sizes="152x152" href="https://picsum.photos/seed/subliminal_icon_152/152/152" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://picsum.photos/seed/subliminal_icon_180/180/180" />
    <link rel="apple-touch-icon" sizes="167x167" href="https://picsum.photos/seed/subliminal_icon_167/167/167" />
    <script type="text/javascript">
      // GitHub Pages SPA hack handling
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).filter(function(v) {
            return v.indexOf('p=/') === 0;
          })[0];
          if (decoded) {
            var path = decoded.slice(3);
            var q = l.search.slice(1).split('&').filter(function(v) {
              return v.indexOf('q=') === 0;
            })[0];
            if (q) path += '?' + q.slice(2).replace(/~and~/g, '&');
            window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.length - 1) + path + l.hash
            );
          }
        }
      }(window.location));
    </script>
    <style>
      :root { --apple-bg: #FFFFFF; --apple-blue: #0071E3; }
      body, html { 
        margin: 0; 
        padding: 0; 
        background: var(--apple-bg); 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        overflow: hidden; 
        height: 100%; 
        width: 100%;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app-shell { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; background: var(--apple-bg); transition: opacity 0.4s ease-out; }
      .shell-logo { width: 80px; height: 80px; background: #f2f2f7; border-radius: 22px; margin-bottom: 24px; animation: pulse 2s infinite ease-in-out; display: flex; align-items: center; justify-content: center; }
      .shell-logo::after { content: ""; width: 40px; height: 40px; background: rgba(0,0,0,0.05); border-radius: 10px; }
      .shell-text { color: #8e8e93; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }
      .hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <div class="shell-logo"></div>
      <div class="shell-text">Subliminal</div>
    </div>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
